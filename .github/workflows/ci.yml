name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, intl, pdo_pgsql, redis, zip, pcntl
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Validate Composer
        run: composer validate --strict

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node Dependencies
        run: npm ci

      - name: Pint
        run: vendor/bin/pint --test

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=1G

      - name: Pest
        run: vendor/bin/pest

      - name: Vite Build
        run: npm run build

  tenant-isolation-pgsql:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: smartrest_test
          POSTGRES_USER: smartrest
          POSTGRES_PASSWORD: smartrest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smartrest -d smartrest_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APP_MAINTENANCE_DRIVER: file
      BCRYPT_ROUNDS: 4
      BROADCAST_CONNECTION: null
      CACHE_STORE: array
      DB_CONNECTION: pgsql
      DB_DATABASE: smartrest_test
      DB_HOST: 127.0.0.1
      DB_PASSWORD: smartrest_app
      DB_PORT: 5432
      DB_URL: ""
      DB_USERNAME: smartrest_app
      MAIL_MAILER: array
      NIGHTWATCH_ENABLED: false
      PULSE_ENABLED: false
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      TELESCOPE_ENABLED: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, intl, pdo_pgsql, redis, zip, pcntl
          coverage: none

      - name: Prepare PostgreSQL App Role
        env:
          PGPASSWORD: smartrest
        run: |
          psql -h 127.0.0.1 -U smartrest -d smartrest_test <<'SQL'
          CREATE ROLE smartrest_app LOGIN PASSWORD 'smartrest_app';
          GRANT CONNECT ON DATABASE smartrest_test TO smartrest_app;
          GRANT USAGE, CREATE ON SCHEMA public TO smartrest_app;
          ALTER SCHEMA public OWNER TO smartrest_app;
          SQL

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Tenant Isolation Pest On PostgreSQL
        run: vendor/bin/pest tests/Feature/Tenancy/TenantIsolationTest.php
